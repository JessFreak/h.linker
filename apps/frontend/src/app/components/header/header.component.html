<mat-toolbar class="h-header">
  <div class="logo-section"
       routerLink="/"
       matTooltip="Go to Home"
       matTooltipPosition="below">
    <mat-icon>terminal</mat-icon>
    <span class="logo-text">h.linker</span>
  </div>

  <nav class="nav-links">
    <a mat-button
       routerLink="/events"
       routerLinkActive="active-link"
       matTooltip="Browse upcoming and past hackathons"
       matTooltipPosition="below">
      Events
    </a>
    <a mat-button
       routerLink="/teams"
       routerLinkActive="active-link"
       matTooltip="Find developers or manage your teams"
       matTooltipPosition="below">
      Teams
    </a>
    <a mat-button
       routerLink="/leaderboard"
       routerLinkActive="active-link"
       matTooltip="Check top-ranked hackers and projects"
       matTooltipPosition="below">
      Leaderboard
    </a>
  </nav>

  <div class="search-section">
    <mat-form-field appearance="outline"
                    subscriptSizing="dynamic"
                    class="h-search-field"
                    matTooltip="Quick search for hackathons, teams, or developers"
                    matTooltipPosition="below">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput placeholder="Search hackathons, hackers...">
    </mat-form-field>
  </div>

  <div class="auth-section">
    @if (user(); as currentUser) {
      <div class="user-profile"
           [routerLink]="['/users', currentUser.username]"
           matTooltip="View your public profile and GitHub insights"
           matTooltipPosition="below">
        <div class="user-details">
          <span class="full-name">{{ currentUser.firstName }} {{ currentUser.lastName }}</span>
          <span class="username h-text-secondary">&#64;{{ currentUser.username }}</span>
        </div>

        <div class="avatar-circle">
          <img [ngSrc]="currentUser.avatarUrl || '/default-avatar.png'"
               [alt]="currentUser.firstName"
               width="40"
               height="40"
               class="user-avatar-img h-avatar"
               priority>
        </div>
      </div>

      <button mat-stroked-button
              type="button"
              class="logout-btn"
              (click)="logout()"
              matTooltip="Sign out from your account"
              matTooltipPosition="below">
        <mat-icon>logout</mat-icon> Logout
      </button>
    } @else {
      <div class="guest-actions">
        <a mat-button
           routerLink="/login"
           class="login-link"
           matTooltip="Access your account">
          Sign In
        </a>
        <button mat-flat-button
                color="primary"
                routerLink="/register"
                matTooltip="Create a new developer profile">
          Sign Up
        </button>
      </div>
    }
  </div>
</mat-toolbar>
