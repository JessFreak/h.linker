<mat-toolbar class="h-header">
  <div class="logo-section" routerLink="/">
    <mat-icon>terminal</mat-icon>
    <span class="logo-text">h.linker</span>
  </div>

  <nav class="nav-links">
    <a mat-button routerLink="/events" routerLinkActive="active-link">Events</a>
    <a mat-button routerLink="/teams" routerLinkActive="active-link">Teams</a>
    <a mat-button routerLink="/leaderboard" routerLinkActive="active-link">Leaderboard</a>
  </nav>

  <div class="search-section">
    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="h-search-field">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput placeholder="Search hackathons, hackers...">
    </mat-form-field>
  </div>

  <div class="auth-section">
    @if (user(); as currentUser) {
      <div class="user-profile" [routerLink]="['/users', currentUser.username]">
        <div class="user-details">
          <span class="full-name">{{ currentUser.firstName }} {{ currentUser.lastName }}</span>
          <span class="username h-text-secondary">&#64;{{ currentUser.username }}</span>
        </div>

        <div class="avatar-circle">
          @if (currentUser.avatarUrl) {
            <img [ngSrc]="currentUser.avatarUrl"
                 [alt]="currentUser.firstName"
                 width="40"
                 height="40"
                 class="user-avatar-img h-avatar"
                 priority>
          } @else {
            <mat-icon class="h-text-secondary">account_circle</mat-icon>
          }
        </div>
      </div>

      <button mat-stroked-button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    } @else {
      <div class="guest-actions">
        <a mat-button routerLink="/login" class="login-link">Sign In</a>
        <button mat-flat-button color="primary" routerLink="/register">Sign Up</button>
      </div>
    }
  </div>
</mat-toolbar>
